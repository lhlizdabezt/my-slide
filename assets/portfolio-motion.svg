<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">my slide line-free portfolio visual</title>
  <desc id="desc">English ASCII-safe SVG visual for my-slide without moving connector lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="55%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <style>
      .title { font: 800 34px Segoe UI, Arial, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font: 650 19px Segoe UI, Arial, sans-serif; fill: #dbeafe; letter-spacing: 0; }
      .chipText { font: 800 15px Segoe UI, Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .caption { font: 700 16px Segoe UI, Arial, sans-serif; fill: #e2e8f0; letter-spacing: 0; }
      .panel { fill: rgba(15,23,42,.54); stroke: rgba(255,255,255,.20); stroke-width: 1.2; }
      .pulse { animation: pulse 3.4s ease-in-out infinite; transform-origin: center; }
      .soft { animation: soft 4.8s ease-in-out infinite; transform-origin: center; }
      @keyframes pulse { 0%, 100% { opacity: .78; transform: scale(.99); } 50% { opacity: 1; transform: scale(1.02); } }
      @keyframes soft { 0%, 100% { opacity: .68; } 50% { opacity: 1; } }
    </style>
  </defs>
  <rect width="1200" height="360" rx="26" fill="url(#bg)" />
  <rect x="38" y="34" width="1124" height="292" rx="22" class="panel" />
  <text x="72" y="66" class="title">my slide</text>
  <text x="72" y="96" class="subtitle">React/Vite/TypeScript slide workspace based on open-slide for</text>
  <text x="72" y="124" class="subtitle">technical decks, static export and presentation experiments.</text>
  <g>
    <g class="pulse"><rect x="89" y="248" width="190" height="48" rx="16" fill="#e0f2fe" /><text x="184.0" y="278" text-anchor="middle" class="chipText">open slide</text></g>
    <g class="pulse"><rect x="297" y="248" width="190" height="48" rx="16" fill="#dcfce7" /><text x="392.0" y="278" text-anchor="middle" class="chipText">presentation</text></g>
    <g class="pulse"><rect x="505" y="248" width="190" height="48" rx="16" fill="#fef9c3" /><text x="600.0" y="278" text-anchor="middle" class="chipText">react</text></g>
    <g class="pulse"><rect x="713" y="248" width="190" height="48" rx="16" fill="#fee2e2" /><text x="808.0" y="278" text-anchor="middle" class="chipText">slides</text></g>
    <g class="pulse"><rect x="921" y="248" width="190" height="48" rx="16" fill="#dbeafe" /><text x="1016.0" y="278" text-anchor="middle" class="chipText">typescript</text></g>
  </g>
  <rect x="72" y="304" width="1056" height="28" rx="14" fill="rgba(15,23,42,.58)" />
  <text x="600.0" y="323" text-anchor="middle" class="caption">English visual asset - no connector lines - release-backed portfolio evidence</text>
</svg>
